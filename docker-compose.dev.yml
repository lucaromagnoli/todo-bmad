# Dev overlay — apply on top of docker-compose.yml for HMR + watch mode.
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Bind-mounts the host source into the containers and runs the dev
# scripts (tsx watch / vite dev). Persists node_modules per-service
# inside named anonymous volumes so the host's macOS/Windows node_modules
# layout doesn't leak into the containers.

services:
  api:
    image: node:22-alpine
    build: !reset null
    command: sh -c "apk add --no-cache python3 make g++ >/dev/null && npm ci -w @todo-bmad/api --include-workspace-root && npm run dev -w @todo-bmad/api"
    working_dir: /app
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_PATH: /data/app.db
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    user: '0:0'
    ports:
      - '${API_PORT:-3001}:3001'
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
      - todo_data:/data
    healthcheck: !reset null

  web:
    image: node:22-alpine
    build: !reset null
    depends_on: !reset null
    command: sh -c "npm ci -w @todo-bmad/web --include-workspace-root && npm run dev -w @todo-bmad/web -- --host 0.0.0.0"
    working_dir: /app
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    ports:
      - '${VITE_PORT:-5173}:5173'
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    healthcheck: !reset null

volumes:
  api_node_modules:
  web_node_modules:
